<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | Holistic Loader</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#11100e;
      --ink:#f4f1ea;
      --muted:#b8afa2;
      --gold:#d6b46a;
      --line:rgba(244,241,234,.18);
      --glass:rgba(244,241,234,.07);
      --glass-strong:rgba(28,26,23,.86);
      --ui:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      --display:Georgia,"Times New Roman",serif;
    }

    *{ box-sizing:border-box; }

    body{
      min-height:100vh;
      margin:0;
      font-family:var(--ui);
      color:var(--ink);
      background:
        radial-gradient(circle at 50% 0%, rgba(214,180,106,.18), transparent 36%),
        linear-gradient(180deg, #171511 0%, #0d0c0b 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:min(430px,100%);
      background:var(--glass-strong);
      border:1px solid var(--line);
      border-radius:22px;
      padding:34px 28px 28px;
      box-shadow:0 20px 70px rgba(0,0,0,.5);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    h1{
      font-family:var(--display);
      font-style:italic;
      font-weight:400;
      font-size:clamp(25px,6vw,32px);
      margin:0 0 10px;
    }

    p{
      color:var(--muted);
      line-height:1.55;
      margin:0 0 22px;
      font-size:14px;
    }

    label{
      display:block;
      margin:14px 0 7px;
      font-size:11.5px;
      letter-spacing:.05em;
      text-transform:uppercase;
      color:var(--muted);
    }

    input{
      width:100%;
      font-size:15px;
      color:var(--ink);
      background:rgba(244,241,234,.06);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      outline:none;
      transition:border-color .2s ease;
    }

    input:focus{ border-color:var(--gold); }

    button{
      width:100%;
      margin-top:20px;
      font-size:13px;
      font-weight:700;
      letter-spacing:.04em;
      color:var(--bg);
      background:var(--gold);
      border:none;
      border-radius:999px;
      padding:13px;
      cursor:pointer;
    }

    button:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .message{
      min-height:20px;
      margin-top:14px;
      font-size:13px;
      line-height:1.45;
    }

    .error{ color:#e79a9a; }
    .success{ color:#9ed7a7; }

    .back{
      display:inline-block;
      margin-top:18px;
      color:var(--muted);
      font-size:13px;
      text-decoration:none;
    }

    .back:hover{ color:var(--ink); text-decoration:underline; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Reset password</h1>
    <p>Choose a new password for your Holistic Loader account.</p>

    <form id="resetForm" novalidate>
      <label for="newPassword">New password</label>
      <input id="newPassword" type="password" autocomplete="new-password" minlength="6" required>

      <label for="confirmPassword">Confirm new password</label>
      <input id="confirmPassword" type="password" autocomplete="new-password" minlength="6" required>

      <button id="savePasswordBtn" type="submit">Update password</button>
      <div id="message" class="message" role="status"></div>
    </form>

    <a class="back" href="/">Back to Holistic Loader</a>
  </main>

  <script>
    const SUPABASE_URL = "https://ibytawdimgthoqwtbtgv.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_X4l9e5OPXE9Cq4XVc1jm_A_Hb6tbJUO";

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const form = document.getElementById("resetForm");
    const message = document.getElementById("message");
    const saveBtn = document.getElementById("savePasswordBtn");

    function showMessage(text, type){
      message.textContent = text;
      message.className = "message " + type;
    }

    // The Supabase client (detectSessionInUrl: true) reads the recovery
    // token from the URL and turns it into a session automatically on
    // load. If someone opens this page directly (no valid/unexpired
    // link), there's no session — check for that up front instead of
    // letting them fill out the form and hit a confusing error.
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        showMessage("This reset link is invalid or has expired. Please request a new one from the login screen.", "error");
        document.getElementById("newPassword").disabled = true;
        document.getElementById("confirmPassword").disabled = true;
        saveBtn.disabled = true;
      }
    })();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      showMessage("", "");

      const password = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password.length < 6) {
        showMessage("Password must be at least 6 characters.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showMessage("The passwords do not match.", "error");
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = "Updating...";

      try {
        const { error } = await sb.auth.updateUser({ password });
        if (error) throw error;

        showMessage("Your password has been updated. You can now log in with your new password.", "success");
        setTimeout(() => {
          window.location.href = "/";
        }, 1600);
      } catch (err) {
        console.error("Update password error:", err);
        const readable =
          (err && typeof err.message === "string" && err.message.trim()) ? err.message :
          "Could not update your password. Please open the reset link from your email again.";
        showMessage(readable, "error");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "Update password";
      }
    });
  </script>
</body>
</html>
