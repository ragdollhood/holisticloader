<style>
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

  :root{
    --ink:#f3efe4;
    --soft:#b3a98f;
    --line:rgba(220,190,130,.16);
    --panel:rgba(22,16,32,.55);
    --gold:#ffd98a;
    --violet:#c9a8ff;

    /* ---- ljust & glatt tema för själva butiken ---- */
    --store-ink:#4a3414;
    --store-soft:#9c7d4a;
    --store-gold:#d9a441;
    --store-card:#fffdf6;
    --store-line:rgba(217,164,65,.4);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%}
  body{
    color:var(--store-ink);
    font-family:'Outfit',-apple-system,system-ui,'Segoe UI',sans-serif;
    display:flex;flex-direction:column;align-items:center;
    padding:max(140px,calc(env(safe-area-inset-top) + 124px)) 16px 48px;
    background:
      radial-gradient(ellipse 90% 50% at 15% -6%, rgba(255,214,140,.55), transparent 60%),
      radial-gradient(ellipse 90% 55% at 100% 110%, rgba(255,190,150,.4), transparent 60%),
      linear-gradient(160deg,#fff9ec 0%, #ffedd2 55%, #fff6e6 100%);
    background-attachment:fixed;
    overflow-x:hidden;
  }

  h1{
    font-family:Georgia,serif;font-size:clamp(15px,4.2vw,20px);font-weight:600;
    letter-spacing:.14em;text-align:center;line-height:1.4;max-width:94vw;margin:0 auto;
    background:linear-gradient(90deg,var(--gold),var(--violet));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  /* ---- rubrikflik: samma stil som på instruments-sidan, en nedfälld flik under navigationen ---- */
  .h1-frame{
    position:sticky;
    top:max(104px,calc(env(safe-area-inset-top) + 92px));
    margin:-36px auto 0;
    z-index:30;
    width:min(94vw,820px);
    padding:9px 24px 9px;
    border:1.5px solid var(--gold);
    border-top:none;
    border-radius:0 0 30px 30px;
    background:linear-gradient(180deg, rgba(20,14,28,.74) 0%, rgba(14,10,20,.62) 100%);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    box-shadow:0 16px 30px rgba(0,0,0,.4), inset 0 10px 18px rgba(255,217,138,.07);
  }
  .h1-frame h1{max-width:none;margin:0}
  .h1-frame .sub-gold{font-size:11px;color:var(--gold);margin-top:6px;text-align:center;letter-spacing:.03em;line-height:1.5}
  @media (max-width:560px){
    .h1-frame{
      top:max(74px,calc(env(safe-area-inset-top) + 60px));
      margin-top:-22px;
      width:92vw;
      padding:9px 14px 7px;
      border-radius:0 0 18px 18px;
    }
  }

  /* ===== shared top logo + tab navigation (same system as instruments.html) ===== */
  #topNav{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;flex-direction:column;align-items:center;
    padding:max(12px,env(safe-area-inset-top)) 16px 0;pointer-events:none;
    background:linear-gradient(to bottom,rgba(6,4,9,.97) 0%,rgba(6,4,9,.97) 92%,rgba(6,4,9,.8) 100%)}
  #topNavBrand{display:flex;align-items:center;gap:10px;pointer-events:auto;text-decoration:none;margin-bottom:10px}
  #topNavLogo{height:50px;width:auto;display:block;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
  #topTabs{display:flex;pointer-events:auto}
  #topTabs .tab{font-family:'Outfit',system-ui,sans-serif;font-weight:500;font-size:12.5px;letter-spacing:.04em;
    padding:9px 20px;color:var(--soft);text-decoration:none;white-space:nowrap;
    background:rgba(243,239,228,.04);border:1px solid var(--line);border-bottom:none;
    border-radius:12px 12px 0 0;margin:0 -1px;position:relative;top:1px;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:color .25s ease,background .25s ease}
  #topTabs .tab:hover{color:var(--ink)}
  #topTabs .tab.active{color:var(--ink);background:var(--panel);top:0;box-shadow:0 -8px 22px rgba(0,0,0,.28);z-index:2;border-color:var(--gold)}
  #topNavLine{position:absolute;left:0;right:0;bottom:0;height:1px;pointer-events:none;
    background:linear-gradient(90deg,transparent,var(--gold) 15%,var(--violet) 50%,var(--gold) 85%,transparent);
    opacity:.55}
  #donateWrap{position:fixed;left:16px;top:max(12px,env(safe-area-inset-top));z-index:45;pointer-events:auto}
  @supports(padding:max(0px)){
    #donateWrap{left:max(16px,env(safe-area-inset-left))}
  }
  .donate{
    display:inline-flex;align-items:center;gap:8px;margin-top:12px;
    font-family:inherit;font-size:12px;font-weight:700;letter-spacing:.08em;
    color:#241604;background:linear-gradient(135deg,var(--gold),#ffb86b);
    border-radius:999px;padding:10px 22px;text-decoration:none;
    box-shadow:0 0 18px rgba(255,217,138,.4);
  }
  .donate .ppmark{flex:0 0 auto;background:#fff;border-radius:5px;padding:2px}
  .donate:active{transform:scale(.96)}
  #donateFixed{position:static;margin:0}
  /* facebook / instagram share + contact row — sits right under the donate button */
  #donateSecondRow{position:absolute;top:calc(100% + 7px);left:0;display:flex;align-items:center;gap:6px}
  .shareIconBtn{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:999px;flex-shrink:0;
    box-shadow:0 2px 8px rgba(0,0,0,.3);transition:transform .15s ease;color:#fff}
  .shareIconBtn:hover{transform:translateY(-1px)}
  .shareIconBtn:active{transform:scale(.92)}
  .shareIconBtn svg{width:14px;height:14px;display:block}
  .shareIconBtn.shareFb{background:#1877F2}
  /* contact / email — one button that expands to the right */
  #contactBtn{display:inline-flex;align-items:center;max-width:calc(100vw - 32px);overflow:hidden;
    border-radius:999px;padding:8px 11px;background:var(--panel);border:1px solid var(--line);color:var(--ink);cursor:pointer;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 8px 22px rgba(0,0,0,.3);transition:background .2s ease,transform .12s ease}
  #contactBtn:hover{background:rgba(243,239,228,.12)}
  #contactBtn:active{transform:scale(.97)}
  #contactBtn .env{flex:0 0 auto;width:18px;height:18px;display:block}
  #contactBtn .ctext{max-width:0;opacity:0;overflow:hidden;white-space:nowrap;font-size:12px;letter-spacing:.03em;transition:max-width .32s ease,opacity .26s ease,margin-left .32s ease}
  #contactBtn.open .ctext{max-width:360px;opacity:1;margin-left:8px}
  #contactBtn .ctext b{color:var(--gold);font-weight:600;letter-spacing:.12em;margin-right:5px}
  @media(max-width:560px){
    #topNavLogo{height:28px}
    #topTabs .tab{padding:8px 13px;font-size:11px}
    #donateFixed{height:30px;padding:0;width:44px;box-sizing:border-box;justify-content:center}
    #donateFixed span{display:none}
    #contactBtn{position:fixed;top:max(12px,env(safe-area-inset-top));left:max(16px,env(safe-area-inset-left));z-index:47;height:30px;padding:0;width:44px;box-sizing:border-box;justify-content:center}

    #donateWrap{top:calc(max(12px,env(safe-area-inset-top)) + 34px)}
    #shareFbTop{position:fixed;top:max(12px,env(safe-area-inset-top));right:max(16px,env(safe-area-inset-right));left:auto;z-index:47}

  .store-wrap{width:100%;max-width:1360px;margin:30px auto 0}

  .product-card{

    padding:12px;

text-decoration:none;

    transition:transform .18s ease, box-shadow .18s ease;
  }
  .product-card:hover{transform:translateY(-4px);box-shadow:0 14px 26px rgba(170,125,40,.22)}
  .product-imgwrap{
    display:flex;align-items:center;justify-content:center;
    width:100%;aspect-ratio:1/1;
    border-radius:14px;overflow:hidden;
    background:#fff3de;
    border:1px solid var(--store-line);
    margin-bottom:10px;
    text-decoration:none;

  }
  .product-title{font-weight:700;font-size:12px;letter-spacing:.02em;color:var(--store-ink);margin-bottom:4px}
  .product-subtitle{font-size:10.5px;color:var(--store-soft);line-height:1.45}

<script>
(function(){
  /* facebook delningsknapp */
  const pageUrl = window.location.href;
  const fbLink = document.getElementById('shareFbTop');
  if(fbLink) fbLink.href = 'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(pageUrl);

  /* kontaktknapp: tryck på kuvertet för att fälla ut och visa mejladressen */
  const cBtn=document.getElementById('contactBtn');
  if(cBtn){
    const hide=function(){ cBtn.classList.remove('open'); cBtn.setAttribute('aria-expanded','false'); };
    cBtn.addEventListener('click',function(e){
      e.stopPropagation();
      const open=cBtn.classList.toggle('open');
      cBtn.setAttribute('aria-expanded',open?'true':'false');
    });
    document.addEventListener('click',function(e){
      if(cBtn.classList.contains('open') && !cBtn.contains(e.target)) hide();
    });
    document.addEventListener('keydown',function(e){ if(e.key==='Escape') hide(); });
  }
})();

      ph.className = 'img-placeholder';
      ph.textContent = 'Add image URL — slot ' + (i+1);
      imgWrap.appendChild(ph);
    }

    const title = document.createElement('div');
    title.className = 'product-title';
    title.textContent = p.titleEn || '';

    const sub = document.createElement('div');
    sub.className = 'product-subtitle';
    sub.textContent = p.subtitle || '';

    card.appendChild(imgWrap);
    card.appendChild(title);
    card.appendChild(sub);
    grid.appendChild(card);
  });
})();
</script>
</body>
</html>
